services:
  - type: pserv
    name: anas-supplements-db
    plan: free
    postgresVersions:
      - 15

  - type: web
    name: anas-supplements-backend
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: anas-supplements-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://tu-proyecto.vercel.app
    buildCommand: npm run server:build
    startCommand: npm run server:start
    autoDeploy: true
